name: Bug Report
description: Report a bug in a OneSchema SDK package
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below so we can investigate.

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which SDK package is affected?
      options:
        - "@oneschema/importer"
        - "@oneschema/react"
        - "@oneschema/angular"
        - "@oneschema/vue"
        - "@oneschema/filefeeds"
        - "@oneschema/filefeeds-react"
        - Other / Multiple
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package version
      description: Which version of the package are you using? (Run `npm ls @oneschema/<package>` to check.)
      placeholder: e.g. 0.7.2
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Initialize the importer with `oneSchemaImporter({ ... })`
        2. Call `launch({ ... })`
        3. Observe error in console
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages or console output.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction link
      description: |
        A minimal reproduction helps us investigate faster. Provide a link to a repository, CodeSandbox, or StackBlitz that demonstrates the issue.
      placeholder: https://codesandbox.io/s/...
    validations:
      required: false

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: In which browser(s) does this occur?
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any additional environment details (OS, framework version, bundler, etc.).
      placeholder: |
        - OS: macOS 14.3
        - React: 18.2.0
        - Bundler: Vite 5.x
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or logs that might be helpful.
    validations:
      required: false
